<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f6dca8" />
    <title>云上菜园 · 联机种菜系统</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest?v=34" />
    <link rel="stylesheet" href="./src/styles.css?v=34" />
  </head>
  <body>
    <main id="app">
      <section id="entry" class="entry active">
        <div class="sunburst"></div>
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="entry-card">
          <div class="logo-orb">
            <span></span>
          </div>
          <p class="eyebrow">ONLINE FARMING SIM</p>
          <h1>云上菜园</h1>
          <p class="subtitle">所有玩家默认进入同一个云端菜园，种菜、收菜、变异蔬菜、背包、集市和在线状态都在这里。</p>
          <div class="entry-grid">
            <label>玩家昵称<input id="playerName" maxlength="14" placeholder="菜园主" /></label>
          </div>
          <button id="enterGame" class="primary">进入菜园</button>
        </div>
      </section>

      <section id="game" class="game hidden">
        <canvas id="farmCanvas" aria-label="云上菜园画布"></canvas>

        <header class="topbar">
          <div>
            <small>金币</small>
            <strong id="coinText">0</strong>
          </div>
          <div>
            <small>仓库</small>
            <strong id="bagText">0</strong>
          </div>
          <div>
            <small>公共菜园</small>
            <strong id="syncText">本地</strong>
          </div>
        </header>

        <section class="seed-strip" id="seedStrip"></section>

        <nav class="dock">
          <button data-panel="garden" class="active">菜园</button>
          <button data-panel="bag">背包</button>
          <button data-panel="market">集市</button>
          <button data-panel="players">玩家</button>
        </nav>

        <aside id="sheet" class="sheet hidden">
          <header>
            <strong id="sheetTitle">菜单</strong>
            <button id="closeSheet">×</button>
          </header>
          <div id="sheetBody" class="sheet-body"></div>
        </aside>

        <div id="toast" class="toast hidden"></div>
      </section>

    </main>

    <script type="module" src="./src/game.js?v=34"></script>
  </body>
</html>
