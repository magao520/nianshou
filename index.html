<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f6dca8" />
    <title>云上菜园 · 联机种菜系统</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest?v=42" />
    <link rel="stylesheet" href="./src/styles.css?v=42" />
  </head>
  <body>
    <main id="app">
      <section id="entry" class="entry active">
        <div class="entry-art"></div>
        <div class="sunburst"></div>
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="entry-card">
          <div class="logo-orb">
            <span></span>
          </div>
          <p class="eyebrow">ONLINE FARMING SIM</p>
          <h1>云上菜园</h1>
          <p class="subtitle">所有玩家默认进入同一个云端菜园，种菜、收菜、变异蔬菜、背包、集市和在线状态都在这里。</p>
          <div class="entry-grid">
            <label>玩家昵称<input id="playerName" maxlength="14" placeholder="菜园主" /></label>
          </div>
          <button id="enterGame" class="primary">进入菜园</button>
        </div>
      </section>

      <section id="game" class="game hidden">
        <canvas id="farmCanvas" aria-label="云上菜园画布"></canvas>

        <header class="topbar">
          <div>
            <small>金币</small>
            <strong id="coinText">0</strong>
          </div>
          <div>
            <small>仓库</small>
            <strong id="bagText">0</strong>
          </div>
          <div>
            <small>公共菜园</small>
            <strong id="syncText">本地</strong>
          </div>
        </header>

        <button id="seedToggle" class="floating-toggle seed-toggle">种子</button>
        <section class="seed-strip" id="seedStrip"></section>

        <button id="toolToggle" class="floating-toggle tool-toggle">工具</button>
        <section class="action-tray" id="actionTray">
          <button id="harvestReady">采摘成熟</button>
          <button id="sellReady">出售蔬菜</button>
          <button id="closeTrays">收起</button>
        </section>

        <button id="menuToggle" class="floating-toggle menu-toggle">菜单</button>

        <nav class="dock">
          <button data-panel="garden" class="active">菜园</button>
          <button data-panel="bag">背包</button>
          <button data-panel="market">集市</button>
          <button data-panel="players">玩家</button>
          <button data-panel="lottery">摇摇乐</button>
          <button data-panel="blackjack">二十一点</button>
        </nav>

        <aside id="sheet" class="sheet hidden">
          <header>
            <strong id="sheetTitle">菜单</strong>
            <button id="closeSheet">×</button>
          </header>
          <div id="sheetBody" class="sheet-body"></div>
        </aside>

        <section id="listingModal" class="listing-modal hidden">
          <div class="listing-card">
            <button id="closeListingModal" class="close-mini">×</button>
            <h3 id="listingTitle">上架商品</h3>
            <p id="listingHint">设置数量和价格后上架到集市。</p>
            <label>数量<input id="listingQty" inputmode="numeric" value="1" /></label>
            <label>单价<input id="listingPrice" inputmode="numeric" value="9" /></label>
            <button id="confirmListing" class="primary">确认上架</button>
          </div>
        </section>

        <div id="toast" class="toast hidden"></div>
      </section>

    </main>

    <script type="module" src="./src/game.js?v=42"></script>
  </body>
</html>
