<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f6dca8" />
    <title>云上菜园 · 联机种菜系统</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest?v=32" />
    <link rel="stylesheet" href="./src/styles.css?v=32" />
  </head>
  <body>
    <main id="app">
      <section id="entry" class="entry active">
        <div class="sunburst"></div>
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="entry-card">
          <div class="logo-orb">
            <span></span>
          </div>
          <p class="eyebrow">ONLINE FARMING SIM</p>
          <h1>云上菜园</h1>
          <p class="subtitle">种菜、收菜、变异蔬菜、玩家在线状态、背包和集市交易，全套竖屏种菜系统。</p>
          <div class="entry-grid">
            <label>玩家昵称<input id="playerName" maxlength="14" placeholder="菜园主" /></label>
            <label>联机房间<input id="roomCode" maxlength="24" value="PUBLIC-FARM" /></label>
          </div>
          <button id="enterGame" class="primary">进入菜园</button>
          <button id="openSyncInfo" class="link-button">同步说明</button>
        </div>
      </section>

      <section id="game" class="game hidden">
        <canvas id="farmCanvas" aria-label="云上菜园画布"></canvas>

        <header class="topbar">
          <div>
            <small>金币</small>
            <strong id="coinText">0</strong>
          </div>
          <div>
            <small>仓库</small>
            <strong id="bagText">0</strong>
          </div>
          <div>
            <small>同步</small>
            <strong id="syncText">本地</strong>
          </div>
        </header>

        <section class="seed-strip" id="seedStrip"></section>

        <nav class="dock">
          <button data-panel="garden" class="active">菜园</button>
          <button data-panel="bag">背包</button>
          <button data-panel="market">集市</button>
          <button data-panel="players">玩家</button>
        </nav>

        <aside id="sheet" class="sheet hidden">
          <header>
            <strong id="sheetTitle">菜单</strong>
            <button id="closeSheet">×</button>
          </header>
          <div id="sheetBody" class="sheet-body"></div>
        </aside>

        <div id="toast" class="toast hidden"></div>
      </section>

      <section id="syncInfo" class="modal hidden">
        <div class="modal-card">
          <button id="closeSyncInfo" class="close">×</button>
          <h2>同步说明</h2>
          <p>当前版本使用“本地优先房间数据模型”：每次操作都会先安全写入本机房间存档，并通过浏览器同步事件合并，避免退出重进丢失、覆盖和半写入。</p>
          <p>真正跨设备公网联机需要部署一个后端端点保存房间状态；不能把数据库密钥或 GitHub Token 写进前端网页，否则别人能直接拿走。</p>
        </div>
      </section>
    </main>

    <script type="module" src="./src/game.js?v=32"></script>
  </body>
</html>
